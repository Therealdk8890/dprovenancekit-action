name: smoke

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gate-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Record golden + candidate traces
        run: |
          python -m pip install --disable-pip-version-check dprovenancekit
          python smoke/record_runs.py

      - name: Gate candidate against golden (context selection, the published action path)
        id: gate
        uses: Therealdk8890/dprovenancekit-action@v1
        with:
          db-path: smoke-traces.sqlite
          golden-context: golden
          candidate-context: candidate
          comment: "false"

      - name: Assert the gate passed
        run: |
          echo "passed=${{ steps.gate.outputs.passed }} level=${{ steps.gate.outputs.regression-level }}"
          test "${{ steps.gate.outputs.passed }}" = "true"
