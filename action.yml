name: "DProvenanceKit regression gate"
description: "Fail a pull request when an agent's reasoning regresses against a golden run, and comment the diff."
branding:
  icon: "git-pull-request"
  color: "purple"

inputs:
  db-path:
    description: "Path to the SQLite trace database containing both runs."
    required: true
  golden-db:
    description: "SQLite db holding the golden run, if separate from db-path (e.g. a restored baseline)."
    required: false
    default: ""
  candidate-db:
    description: "SQLite db holding the candidate run, if separate from db-path."
    required: false
    default: ""
  golden-run-id:
    description: "Run id of the golden (known-good) trace. Provide this or golden-context (cloud sync via dprov-api-key requires a run id)."
    required: false
    default: ""
  candidate-run-id:
    description: "Run id of the candidate trace to gate. Provide this or candidate-context."
    required: false
    default: ""
  golden-context:
    description: "Instead of golden-run-id: use the newest run with this context id as the golden. (Cloud sync via dprov-api-key pulls by run id and still requires golden-run-id.)"
    required: false
    default: ""
  candidate-context:
    description: "Instead of candidate-run-id: use the newest run with this context id as the candidate (anomaly rules resolve it the same way)."
    required: false
    default: ""
  max-level:
    description: "Worst regression severity that still passes: none | low | medium | high."
    required: false
    default: "none"
  allow-divergent:
    description: "Tolerate per-step changes; gate only on severity (true | false)."
    required: false
    default: "false"
  fail-on-regression:
    description: "Fail the job when a regression is detected (true | false)."
    required: false
    default: "true"
  comment:
    description: "Post a sticky summary comment on the pull request (true | false)."
    required: false
    default: "true"
  anomaly-rules:
    description: "Path to a JSON rules config. When set, runs the out-of-the-box anomaly rules over the candidate run."
    required: false
    default: ""
  fail-on-anomaly:
    description: "Fail the job when an anomaly rule fires (true | false)."
    required: false
    default: "false"
  install-spec:
    description: "pip requirement to install the gate from (e.g. 'dprovenancekit', 'dprovenancekit==0.2.0', or a VCS URL)."
    required: false
    default: "dprovenancekit"
  python-version:
    description: "Python version to set up."
    required: false
    default: "3.x"
  github-token:
    description: "Token used to post the PR comment. Defaults to the job's GITHUB_TOKEN."
    required: false
    default: ${{ github.token }}
  dprov-api-key:
    description: "API Key for DProvenanceKit SaaS. Required for syncing golden traces from the cloud."
    required: false
    default: ""
  dprov-api-url:
    description: "Optional URL for a custom DProvenanceKit SaaS backend."
    required: false
    default: "https://api.dprovenance.dev"

outputs:
  passed:
    description: "true when no regression was detected, false otherwise."
    value: ${{ steps.gate.outputs.passed }}
  regression-level:
    description: "Engine-assessed severity: none | low | medium | high."
    value: ${{ steps.gate.outputs.regression-level }}
  summary:
    description: "Human-readable gate summary."
    value: ${{ steps.gate.outputs.summary }}
  report-json:
    description: "Full gate report as a JSON string."
    value: ${{ steps.gate.outputs.report-json }}
  anomaly-count:
    description: "Number of anomalies the rules fired on (0 when anomaly-rules is unset)."
    value: "${{ steps.anomalies.outputs.anomaly-count || '0' }}"
  anomalies-json:
    description: "Anomaly findings as a JSON string ('{}' when anomaly-rules is unset)."
    value: "${{ steps.anomalies.outputs.anomalies-json || '{}' }}"

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install dprovenancekit
      shell: bash
      run: python -m pip install --disable-pip-version-check "${{ inputs.install-spec }}"

    - name: Pull golden trace from cloud
      if: ${{ inputs.dprov-api-key != '' }}
      shell: bash
      run: |
        if [ -z "${{ inputs.golden-run-id }}" ]; then
          echo "::error title=DProvenanceKit::dprov-api-key is set but golden-run-id is empty — cloud sync pulls the golden by run id and cannot use golden-context. Pass golden-run-id, or remove dprov-api-key to gate against a local baseline."
          exit 1
        fi
        python -m dprovenancekit.cli sync pull --run "${{ inputs.golden-run-id }}" --db "${{ inputs.golden-db || inputs.db-path }}"
      env:
        DPROV_API_KEY: ${{ inputs.dprov-api-key }}
        DPROV_API_URL: ${{ inputs.dprov-api-url }}

    - name: Run regression gate
      id: gate
      shell: bash
      run: python "${{ github.action_path }}/run_gate.py"
      env:
        DPROV_DB: ${{ inputs.db-path }}
        DPROV_GOLDEN_DB: ${{ inputs.golden-db || inputs.db-path }}
        DPROV_CANDIDATE_DB: ${{ inputs.candidate-db || inputs.db-path }}
        DPROV_GOLDEN: ${{ inputs.golden-run-id }}
        DPROV_GOLDEN_CONTEXT: ${{ inputs.golden-context }}
        DPROV_CANDIDATE: ${{ inputs.candidate-run-id }}
        DPROV_CANDIDATE_CONTEXT: ${{ inputs.candidate-context }}
        DPROV_MAX_LEVEL: ${{ inputs.max-level }}
        DPROV_ALLOW_DIVERGENT: ${{ inputs.allow-divergent }}

    - name: Run anomaly rules
      id: anomalies
      if: ${{ inputs.anomaly-rules != '' }}
      shell: bash
      run: python "${{ github.action_path }}/run_anomalies.py"
      env:
        DPROV_DB: ${{ inputs.db-path }}
        DPROV_CANDIDATE: ${{ inputs.candidate-run-id }}
        DPROV_CANDIDATE_CONTEXT: ${{ inputs.candidate-context }}
        DPROV_ANOMALY_RULES: ${{ inputs.anomaly-rules }}

    - name: Comment on pull request
      if: ${{ inputs.comment == 'true' && github.event_name == 'pull_request' }}
      shell: bash
      run: python "${{ github.action_path }}/pr_comment.py"
      env:
        DPROV_REPORT_JSON: ${{ steps.gate.outputs.report-json }}
        GITHUB_TOKEN: ${{ inputs.github-token }}

    - name: Enforce gate
      if: ${{ inputs.fail-on-regression == 'true' && steps.gate.outputs.passed != 'true' }}
      shell: bash
      run: |
        echo "::error title=DProvenanceKit::Regression gate failed (severity: ${{ steps.gate.outputs.regression-level }})"
        exit 1

    - name: Enforce anomaly rules
      if: ${{ inputs.fail-on-anomaly == 'true' && steps.anomalies.outputs.anomaly-count != '' && steps.anomalies.outputs.anomaly-count != '0' }}
      shell: bash
      run: |
        echo "::error title=DProvenanceKit::${{ steps.anomalies.outputs.anomaly-count }} anomaly rule(s) fired"
        exit 1

